name: CodeGuard CI 

on:
  push:
  pull_request:

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run CodeGuard Coverage
        run: |
          python -m ai_code_reviewer.cli --ci